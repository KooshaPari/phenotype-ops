name: quality
version: "1.0"
pillar: quality
description: Code quality checks (formatting, linting, testing)
skip_if:
  no_changes_to:
    - "*.rs"
    - "Cargo.toml"
    - "Cargo.lock"
  not_modified_since_hours: 24
  env_var: SKIP_QUALITY
checks:
  - name: fmt
    command: "cargo fmt --all -- --check"
    timeout_seconds: 60
    globs: ["*.rs"]
    required_tools: ["cargo"]
    allow_failure: false

  - name: clippy
    command: "cargo clippy --all-targets --all-features -- -D warnings"
    timeout_seconds: 180
    globs: ["*.rs", "Cargo.toml"]
    required_tools: ["cargo"]
    allow_failure: false

  - name: check
    command: "cargo check --all-targets --all-features"
    timeout_seconds: 120
    globs: ["*.rs", "Cargo.toml"]
    required_tools: ["cargo"]
    allow_failure: false

  - name: test
    command: "cargo nextest run --all-targets --all-features"
    timeout_seconds: 300
    globs: ["*.rs", "Cargo.toml", "tests/**/*.rs"]
    required_tools: ["cargo", "cargo-nextest"]
    allow_failure: false

  - name: doc
    command: "cargo doc --all-features --no-deps --document-private-items"
    timeout_seconds: 180
    globs: ["*.rs", "Cargo.toml"]
    required_tools: ["cargo"]
    allow_failure: false