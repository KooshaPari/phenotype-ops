name: Full CI (Fallback)

on:
  workflow_call:
    inputs:
      rust-version:
        description: Rust toolchain version
        type: string
        required: false
        default: "1.80"
      node-version:
        description: Node version for tooling
        type: string
        required: false
        default: "20"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          shared-key: ${{ runner.os }}-cargo-

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo nextest run
        run: cargo nextest run --all-targets --all-features

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          shared-key: ${{ runner.os }}-cargo-

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --deny warnings

      - name: cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories bans licenses sources

      - name: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}

  perf:
    name: Performance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          shared-key: ${{ runner.os }}-cargo-

      - name: cargo bench (baseline)
        run: cargo bench --all-features -- --save-baseline main || true

  compliance:
    name: Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: cargo deny check
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Check SPDX headers
        run: |
          # Check all Rust files have SPDX headers
          find . -name "*.rs" -not -path "./target/*" | xargs grep -L "SPDX-License-Identifier" && exit 1 || true

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-target target/sbom.json

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: cargo doc
        run: cargo doc --all-features --no-deps --document-private-items

      - name: Check broken links
        run: |
          cargo install cargo-deadlinks --locked
          cargo deadlinks

      - name: Spellcheck
        run: |
          pip install codespell
          codespell --skip="./target,./.git" --ignore-words=.github/codespell-ignore.txt