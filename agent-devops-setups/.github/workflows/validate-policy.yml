name: validate-policy-federation
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validation dependency
        run: python -m pip install --user "jsonschema==4.24.0"
      - name: Resolve sample policy
        run: |
          python tools/federate_policy.py \
            --repo agent-devops-setups \
            --harness codex \
            --user core-operator \
            --task-domain agentops \
            --extensions codex-gate,agentops-ci \
            --out /tmp/effective-policy.json
      - name: Validate policy schema and manifest compatibility
        run: |
          python tools/validate_policy_payload.py \
            --payload /tmp/effective-policy.json \
            --policy-schema schemas/policy-resolution.schema.json \
            --manifest-schema schemas/extension-manifest.schema.json \
            --manifest-dir extensions/manifests \
            --strict
      - name: Basic policy checks
        run: |
          python - <<'PY'
import json
payload = json.load(open('/tmp/effective-policy.json'))
assert payload.get('policy'), "policy missing"
assert payload.get('audit', {}).get('files'), "files missing"
print("policy keys:", sorted(payload['policy'].keys()))
PY
